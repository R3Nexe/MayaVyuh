services:
  - type: web
    name: mayavyuh-backend
    env: node
    rootDir: backend
    buildCommand: "npm install && pip install --no-cache-dir torch==2.12.1+cpu torchvision==0.27.1+cpu --index-url https://download.pytorch.org/whl/cpu && pip install --no-cache-dir opencv-python-headless numpy scikit-image Pillow scikit-learn"
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: "eu-north-1"
      - key: HF_TOKEN
        sync: false
      - key: AWS_S3_Bucket_name
        value: "mayavyuh-images-4827-131404648287-eu-north-1-an"